*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cb-blue:#012169;--midnight:#0A1730;--smoky:#58718D;--glacier:#DAE1E8;
  --icy:#F0F5FB;--bright:#1F69FF;--celestial:#418FDE;--tide:#B8CFEA;--mist:#BECAD7;
  --ui-bg:#0d1117;--ui-panel:#161b22;--ui-border:#21262d;--ui-text:#e6edf3;
  --ui-muted:#7d8590;--ui-accent:#418FDE;
  --mobile-bar:56px;
}
html,body{height:100%;background:var(--ui-bg);color:var(--ui-text);font-family:'Bauziet',sans-serif;overflow:hidden;}

/* ═══════════════════════════════════════
   DESKTOP LAYOUT  (≥ 769px)
═══════════════════════════════════════ */
.app{display:grid;grid-template-columns:300px 1fr 210px;height:100vh;overflow:hidden;}

.sidebar{background:var(--ui-panel);border-right:1px solid var(--ui-border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:var(--ui-border);border-radius:2px;}

.canvas-area{background:var(--ui-bg);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.canvas-toolbar{width:100%;padding:10px 16px;border-bottom:1px solid var(--ui-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.size-pills{display:flex;gap:4px;}
.size-pill{background:var(--ui-panel);border:1px solid var(--ui-border);color:var(--ui-muted);padding:5px 10px;font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.size-pill:hover{border-color:var(--ui-accent);color:var(--ui-accent);}.size-pill.active{background:var(--ui-accent);border-color:var(--ui-accent);color:#fff;}
.canvas-viewport{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;width:100%;position:relative;}
#canvas-display-wrapper{position:relative;flex-shrink:0;}
#post-canvas{position:relative;overflow:hidden;transform-origin:top left;font-family:'Bauziet',sans-serif;flex-shrink:0;}
#post-canvas.draggable{cursor:grab;}.has-photo:active{cursor:grabbing;}
#post-canvas.draggable:hover::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 3px rgba(65,143,222,.5);pointer-events:none;z-index:999;}

.template-panel{background:var(--ui-panel);border-left:1px solid var(--ui-border);overflow-y:auto;padding:14px;}
.template-panel::-webkit-scrollbar{width:4px;}.template-panel::-webkit-scrollbar-thumb{background:var(--ui-border);}
.template-panel-title{font-family:'Geometos',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--ui-muted);margin-bottom:12px;}
.template-grid{display:flex;flex-direction:column;gap:8px;}
.template-thumb{width:100%;aspect-ratio:1;border-radius:4px;border:2px solid transparent;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;flex-shrink:0;}
.template-thumb:hover{border-color:var(--ui-accent);}.template-thumb.active{border-color:var(--cb-blue);box-shadow:0 0 0 1px var(--cb-blue);}
.template-thumb-inner{width:100%;height:100%;}
.template-thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);padding:4px 6px;font-family:'Geometos',sans-serif;font-size:6px;letter-spacing:1px;text-transform:uppercase;color:#fff;}

/* Mobile-only elements hidden on desktop */
.mobile-template-strip,.mobile-bottom-bar,.drawer-overlay,.drawer{display:none;}
.status-bar{width:100%;padding:4px 16px;border-top:1px solid var(--ui-border);font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:1.5px;color:var(--ui-muted);text-align:center;flex-shrink:0;text-transform:uppercase;}

/* ═══════════════════════════════════════
   SHARED FORM STYLES
═══════════════════════════════════════ */
.sidebar-header{padding:16px;border-bottom:1px solid var(--ui-border);}
.sidebar-logo{color:var(--ui-accent);font-size:10px;font-family:'Geometos',sans-serif;letter-spacing:2px;text-transform:uppercase;line-height:1.4;}
.sidebar-logo span{display:block;color:var(--ui-muted);font-size:8px;letter-spacing:3px;}
.section{padding:14px 16px;border-bottom:1px solid var(--ui-border);}
.section-title{font-family:'Geometos',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--ui-muted);margin-bottom:10px;}
.post-types{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pt-btn{background:var(--ui-bg);border:1px solid var(--ui-border);color:var(--ui-muted);padding:8px 4px;font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:3px;text-align:center;transition:all .2s;}
.pt-btn:hover{border-color:var(--ui-accent);color:var(--ui-accent);}.pt-btn.active{background:var(--cb-blue);border-color:var(--cb-blue);color:#fff;}
label{display:block;font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--ui-muted);margin-bottom:5px;margin-top:10px;}
label:first-child{margin-top:0;}
input[type=text],input[type=tel],input[type=date],input[type=time],textarea{
  width:100%;background:var(--ui-bg);border:1px solid var(--ui-border);color:var(--ui-text);
  padding:9px 10px;font-family:'Bauziet',sans-serif;font-size:14px;font-weight:300;
  border-radius:3px;outline:none;transition:border-color .2s;-webkit-appearance:none;
}
input:focus,textarea:focus{border-color:var(--ui-accent);}
textarea{resize:vertical;min-height:52px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

/* photo gallery */
.photo-gallery{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.photo-thumb-wrap{position:relative;width:62px;height:62px;flex-shrink:0;}
.photo-thumb{width:62px;height:62px;object-fit:cover;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color .2s;display:block;}
.photo-thumb.active{border-color:var(--ui-accent);}
.photo-thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#B22222;border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-add-btn{width:62px;height:62px;background:var(--ui-bg);border:1.5px dashed var(--ui-border);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ui-muted);transition:border-color .2s;position:relative;flex-shrink:0;}
.photo-add-btn:hover{border-color:var(--ui-accent);}
.photo-add-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.auto-fit-badge{display:none;margin-top:8px;background:rgba(65,143,222,.08);border:1px solid rgba(65,143,222,.2);border-radius:3px;padding:7px 10px;}
.auto-fit-badge.show{display:block;}
.auto-fit-text{font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:1.5px;color:var(--ui-accent);text-transform:uppercase;}
.auto-fit-sub{font-family:'Bauziet',sans-serif;font-weight:300;font-size:10px;color:var(--ui-muted);margin-top:2px;}

/* agent headshot */
.agent-photo-wrap{display:flex;align-items:center;gap:10px;margin-top:10px;}
.agent-hs-preview{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--ui-border);display:none;}
.agent-hs-preview.show{display:block;}
.agent-photo-upload{flex:1;background:var(--ui-bg);border:1.5px dashed var(--ui-border);border-radius:3px;padding:9px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.agent-photo-upload:hover{border-color:var(--ui-accent);}
.agent-photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.agent-photo-upload-text{font-family:'Geometos',sans-serif;font-size:7px;letter-spacing:1.5px;color:var(--ui-muted);text-transform:uppercase;}

.export-btn{background:var(--cb-blue);border:none;color:#fff;padding:8px 20px;font-family:'Geometos',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .2s;}
.export-btn:hover{background:#0a2f8a;}.export-btn:disabled{opacity:.5;cursor:wait;}
.conditional{display:none;}.conditional.show{display:block;}

/* zoom badge */
#zoom-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.75);color:#fff;font-family:'Geometos',sans-serif;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:100;}
#zoom-badge.show{opacity:1;}

/* ═══════════════════════════════════════
   MOBILE LAYOUT (≤ 768px)
═══════════════════════════════════════ */
@media (max-width:768px){
  body{overflow:hidden;position:fixed;width:100%;height:100%;}
  .app{display:flex;flex-direction:column;height:100dvh;grid-template-columns:unset;}

  /* hide desktop-only elements */
  .sidebar,.template-panel,.canvas-toolbar,.status-bar{display:none;}

  /* canvas takes most of the screen */
  .canvas-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
  .canvas-viewport{flex:1;padding:12px 12px 6px;}

  /* horizontal template strip */
  .mobile-template-strip{display:flex;background:var(--ui-panel);border-top:1px solid var(--ui-border);padding:8px 10px;gap:8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .mobile-template-strip::-webkit-scrollbar{display:none;}
  .mobile-tmpl-thumb{width:52px;height:52px;border-radius:4px;border:2px solid transparent;cursor:pointer;overflow:hidden;position:relative;flex-shrink:0;transition:border-color .2s;}
  .mobile-tmpl-thumb.active{border-color:var(--ui-accent);}
  .mobile-tmpl-thumb-inner{width:100%;height:100%;}
  .mobile-tmpl-num{position:absolute;bottom:1px;right:3px;font-family:'Geometos',sans-serif;font-size:6px;color:rgba(255,255,255,.7);}

  /* size pills row */
  .mobile-size-strip{display:flex;background:var(--ui-bg);padding:6px 10px;gap:6px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .mobile-size-strip::-webkit-scrollbar{display:none;}

  /* bottom action bar */
  .mobile-bottom-bar{display:flex;background:var(--ui-panel);border-top:1px solid var(--ui-border);padding:8px 16px;gap:10px;flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
  .mobile-edit-btn{flex:1;background:var(--ui-bg);border:1px solid var(--ui-border);color:var(--ui-text);padding:12px;font-family:'Geometos',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;text-align:center;}
  .mobile-export-btn{flex:1;background:var(--cb-blue);border:none;color:#fff;padding:12px;font-family:'Geometos',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;text-align:center;}
  .mobile-export-btn:disabled{opacity:.5;}

  /* drawer overlay */
  .drawer-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
  .drawer-overlay.open{opacity:1;pointer-events:all;}

  /* drawer panel */
  .drawer{display:flex;flex-direction:column;position:fixed;left:0;right:0;bottom:0;height:88dvh;background:var(--ui-panel);border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.25,.8,.25,1);overflow:hidden;}
  .drawer.open{transform:translateY(0);}
  .drawer-handle{width:36px;height:4px;background:var(--ui-border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
  .drawer-header{padding:12px 16px 10px;border-bottom:1px solid var(--ui-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .drawer-title{font-family:'Geometos',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--ui-accent);}
  .drawer-close{background:none;border:none;color:var(--ui-muted);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;}
  .drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .drawer-body::-webkit-scrollbar{display:none;}
}
</style>
</head>

/* ═══ AUTO-FIT ZOOM ════════════════════════════════════════════ */
// Calculate the minimum background-size% needed to COVER a container
// of containerW × containerH with an image of imgW × imgH.
// background-size:X% means image is rendered at width = containerW * X/100
// so image displayed height = imgH * (containerW * X/100) / imgW
// We need: imageW >= containerW AND imageH >= containerH
// Solving: X >= 100  AND  X >= 100 * containerH * imgW / (containerW * imgH)
function calcCoverZoom(imgW,imgH,containerW,containerH){
  if(!imgW||!imgH||!containerW||!containerH) return 100;
  const coverH=100*containerH*imgW/(containerW*imgH);
  return Math.ceil(Math.max(100,coverH));
}
function applyAutoFit(){
  const ph=getPhoto();
  if(!ph) return;
  const sz=SIZES[state.size];
  const iw=state.photoNatW[state.activePhotoIdx]||1;
  const ih=state.photoNatH[state.activePhotoIdx]||1;
  // Use canvas dimensions as the reference container
  const zoom=calcCoverZoom(iw,ih,sz.w,sz.h);
  state.photoZoom=Math.min(zoom,350);
  state.photoX=0; state.photoY=0;
  state.userHasZoomed=false;
}

/* ═══ HELPERS ══════════════════════════════════════════════════ */
function getPhoto(){ return state.photos[state.activePhotoIdx]||null; }
function fsc(s){ return s.w>s.h?Math.round(s.h*1.55):s.w; }
function psc(s){ return Math.min(s.w,s.h); }
function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+(+day)+', '+y;
}
function fmtTime(t){
  if(!t) return '';
  const [h,m]=t.split(':'); const hr=+h;
  return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;
}
function buildOH(){
  const d=fmtDate(state.ohDate),s=fmtTime(state.ohStart),e=fmtTime(state.ohEnd);
  if(d&&s&&e) return `${d} ● ${s} – ${e}`;
  if(d&&s) return `${d} ● ${s}`;
  return d||'';
}
function cssPhoto(){
  const ph=getPhoto();
  if(!ph) return 'background:#0A1730;';
  const px=50+state.photoX,py=50+state.photoY;
  return `background-image:url('${ph}');background-size:${state.photoZoom}%;background-position:${px}% ${py}%;`;
}
function agentLine(){
  const n=[state.agentFirst,state.agentLast].filter(Boolean).join(' ');
  return [n,state.agentTitle].filter(Boolean).join(' • ');
}
function agentBlock(s,tc,bc,sc){
  const fs=fsc(s),agfs=Math.round(fs*.019),sz=Math.round(fs*.065);
  const ph=state.agentPhoto?`<div style="width:${sz}px;height:${sz}px;border-radius:50%;overflow:hidden;border:2px solid ${bc};flex-shrink:0;background-image:url('${state.agentPhoto}');background-size:cover;background-position:center;"></div>`:'';
  return `<div style="display:flex;align-items:center;gap:${Math.round(fs*.014)}px;">
    ${ph}
    <div>
      ${agentLine()?`<div style="font-family:'Geometos';font-size:${agfs}px;letter-spacing:1.5px;color:${tc};text-transform:uppercase;">${agentLine()}</div>`:''}
      ${state.agentPhone?`<div style="font-family:'Bauziet';font-weight:300;font-size:${Math.round(agfs*.9)}px;color:${sc};">${state.agentPhone}</div>`:''}
      ${state.agentEmail?`<div style="font-family:'Bauziet';font-weight:300;font-size:${Math.round(agfs*.82)}px;color:${sc};opacity:.7;">${state.agentEmail}</div>`:''}
    </div>
  </div>`;
}

/* ═══ RENDER & FIT ═════════════════════════════════════════════ */
function renderCanvas(){
  const sz=SIZES[state.size];
  const c=document.getElementById('post-canvas');
  c.style.width=sz.w+'px'; c.style.height=sz.h+'px';
  c.innerHTML=TEMPLATES[state.template-1].render(sz);
  c.classList.toggle('draggable',!!getPhoto());
  fitCanvas();
}
function fitCanvas(){
  const sz=SIZES[state.size];
  const vp=document.getElementById('canvas-viewport');
  currentScale=Math.min((vp.clientWidth-24)/sz.w,(vp.clientHeight-24)/sz.h,1);
  const c=document.getElementById('post-canvas');
  const w=document.getElementById('canvas-display-wrapper');
  c.style.transform=`scale(${currentScale})`;
  c.style.transformOrigin='top left';
  w.style.width=Math.round(sz.w*currentScale)+'px';
  w.style.height=Math.round(sz.h*currentScale)+'px';
  document.getElementById('status-bar').textContent=SIZES[state.size].label;
}

/* ═══ BUILD THUMBS ═════════════════════════════════════════════ */
const TB=['#012169','#0A1730','#012169','#DAE1E8','#0A1730','#0A1730','#fff','#012169','#DAE1E8','#012169'];
const TA=['#1F69FF','#fff','#012169','#012169','#B8A98A','#1F69FF','#012169','#1F69FF','#012169','#1F69FF'];
function buildThumbs(){
  ['template-grid-desktop','mobile-tmpl-strip'].forEach(containerId=>{
    const isMobile=containerId==='mobile-tmpl-strip';
    const container=document.getElementById(containerId);
    TEMPLATES.forEach((t,i)=>{
      const idx=i+1,dark=TB[i]==='#DAE1E8'||TB[i]==='#fff';
      const div=document.createElement('div');
      div.className=(isMobile?'mobile-tmpl-thumb':'template-thumb')+(idx===1?' active':'');
      div.dataset.tmpl=idx;
      div.innerHTML=isMobile?`
        <div class="mobile-tmpl-thumb-inner" style="width:100%;height:100%;background:${TB[i]};display:flex;flex-direction:column;padding:5px;justify-content:space-between;box-sizing:border-box;">
          <div style="width:70%;height:2px;background:${TA[i]};opacity:.8;"></div>
          <div><div style="width:55%;height:5px;background:rgba(${dark?'1,33,105':'255,255,255'},.85);border-radius:1px;margin-bottom:2px;"></div>
          <div style="width:78%;height:2px;background:rgba(${dark?'1,33,105':'255,255,255'},.4);border-radius:1px;"></div></div>
          <div style="width:40%;height:2px;background:${TA[i]};opacity:.5;"></div>
        </div>
        <div class="mobile-tmpl-num">${idx}</div>`:
        `<div class="template-thumb-inner" style="background:${TB[i]};display:flex;flex-direction:column;padding:8px;justify-content:space-between;box-sizing:border-box;">
          <div style="width:70%;height:3px;background:${TA[i]};opacity:.8;"></div>
          <div><div style="width:55%;height:7px;background:rgba(${dark?'1,33,105':'255,255,255'},.85);border-radius:1px;margin-bottom:3px;"></div>
          <div style="width:78%;height:3px;background:rgba(${dark?'1,33,105':'255,255,255'},.45);border-radius:1px;"></div></div>
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:12px;height:12px;border-radius:50%;background:rgba(${dark?'1,33,105':'255,255,255'},.3);"></div>
            <div style="width:40%;height:2px;background:${TA[i]};opacity:.5;"></div>
          </div>
        </div>
        <div class="template-thumb-label">${idx}. ${t.name}</div>`;
      div.addEventListener('click',()=>{
        container.querySelectorAll(isMobile?'.mobile-tmpl-thumb':'.template-thumb').forEach(e=>e.classList.remove('active'));
        div.classList.add('active');

        document.querySelectorAll(`[data-tmpl="${idx}"]`).forEach(el=>el.classList.add('active'));
        document.querySelectorAll(`[data-tmpl]:not([data-tmpl="${idx}"])`).forEach(el=>el.classList.remove('active'));
        state.template=idx;
        renderCanvas();
      });
      container.appendChild(div);
    });
  });
}

/* ═══ SIZE PILLS ═══════════════════════════════════════════════ */
function buildSizePills(){
  ['size-pills-desktop','size-pills-mobile'].forEach(containerId=>{
    const container=document.getElementById(containerId);
    Object.entries(SIZES).forEach(([key,sz],i)=>{
      const btn=document.createElement('button');
      btn.className='size-pill'+(i===0?' active':'');
      btn.dataset.size=key;
      btn.textContent=key.charAt(0).toUpperCase()+key.slice(1);
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.size-pill').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll(`[data-size="${key}"]`).forEach(el=>el.classList.add('active'));
        state.size=key;
        if(!state.userHasZoomed) applyAutoFit();
        renderCanvas();
      });
      container.appendChild(btn);

/* ═══ FORM EVENTS — bind both desktop + mobile copies ══════════ */
function bindFormEvents(){
  // Use event delegation on both form containers
  ['form-desktop','form-mobile','drawer-body'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.addEventListener('input',syncFromEvent);
    el.addEventListener('change',syncFromEvent);
  });
  // Specific file inputs
  document.querySelectorAll('#photo-input').forEach(inp=>inp.addEventListener('change',handlePhotoUpload));
  document.querySelectorAll('#agent-photo-input').forEach(inp=>inp.addEventListener('change',handleAgentPhoto));
  document.querySelectorAll('.pt-btn').forEach(btn=>btn.addEventListener('click',handlePostType));
}

function syncFromEvent(e){
  const t=e.target;
  const map={
    'address':'address','city':'city','price':'price','beds':'beds','baths':'baths',
    'sqft':'sqft','tagline':'tagline','agent-first':'agentFirst','agent-last':'agentLast',
    'agent-phone':'agentPhone','agent-email':'agentEmail','agent-title':'agentTitle',
    'oh-date':'ohDate','oh-start':'ohStart','oh-end':'ohEnd',
  };
  if(map[t.id]){ state[map[t.id]]=t.value; renderCanvas(); }
}

function handlePostType(e){
  document.querySelectorAll('.pt-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`.pt-btn[data-type="${e.currentTarget.dataset.type}"]`).forEach(b=>b.classList.add('active'));
  state.postType=e.currentTarget.dataset.type;
  document.querySelectorAll('#cond-oh').forEach(el=>el.classList.toggle('show',state.postType==='open-house'));
  renderCanvas();
}

/* ═══ PHOTO GALLERY ═══════════════════════════════════════════ */
function buildPhotoThumb(url,idx){
  const wrap=document.createElement('div');
  wrap.className='photo-thumb-wrap';
  const img=document.createElement('img');
  img.className='photo-thumb'+(idx===state.activePhotoIdx?' active':'');
  img.src=url;
  img.addEventListener('click',()=>{
    state.activePhotoIdx=idx;
    state.userHasZoomed=false;
    applyAutoFit();
    document.querySelectorAll('.photo-thumb').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.photo-thumb')[idx]?.classList.add('active');
    renderCanvas();
  });
  const del=document.createElement('button');
  del.className='photo-thumb-del';
  del.textContent='×';
  del.addEventListener('click',ev=>{
    ev.stopPropagation();
    state.photos.splice(idx,1);
    state.photoNatW.splice(idx,1);
    state.photoNatH.splice(idx,1);
    state.activePhotoIdx=Math.min(state.activePhotoIdx,Math.max(0,state.photos.length-1));
    rebuildGallery(); renderCanvas();
  });
  wrap.appendChild(img); wrap.appendChild(del);
  return wrap;
}
function rebuildGallery(){
  document.querySelectorAll('#photo-gallery').forEach(gallery=>{
    const addBtn=gallery.querySelector('#photo-add-btn');
    gallery.querySelectorAll('.photo-thumb-wrap').forEach(el=>el.remove());
    state.photos.forEach((url,i)=>gallery.insertBefore(buildPhotoThumb(url,i),addBtn));
  });
  document.querySelectorAll('#auto-fit-badge').forEach(el=>el.classList.toggle('show',state.photos.length>0));
  document.getElementById('post-canvas').classList.toggle('draggable',!!getPhoto());
}

function handlePhotoUpload(e){
  const files=Array.from(e.target.files); if(!files.length) return;
  const startIdx=state.photos.length;
  let loaded=0;
  files.forEach((file,fi)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=ev=>{
      img.onload=()=>{
        const insertIdx=startIdx+fi;
        state.photos[insertIdx]=ev.target.result;
        state.photoNatW[insertIdx]=img.naturalWidth;
        state.photoNatH[insertIdx]=img.naturalHeight;
        loaded++;
        if(loaded===files.length){
          state.activePhotoIdx=startIdx;
          state.userHasZoomed=false;
          applyAutoFit();
          rebuildGallery(); renderCanvas();
        }
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

function handleAgentPhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.agentPhoto=ev.target.result;
    document.querySelectorAll('#agent-hs-preview').forEach(el=>{ el.src=state.agentPhoto; el.classList.add('show'); });
    renderCanvas();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

/* ═══ DRAG-TO-PAN + SCROLL-ZOOM ════════════════════════════════ */
let isDragging=false,dragStart={x:0,y:0},dragStartState={x:0,y:0};
let zoomTimeout=null;
function showZoom(){
  const b=document.getElementById('zoom-badge');
  b.textContent=Math.round(state.photoZoom)+'%';
  b.classList.add('show');
  clearTimeout(zoomTimeout);
  zoomTimeout=setTimeout(()=>b.classList.remove('show'),1500);
}
const cvs=document.getElementById('post-canvas');
cvs.addEventListener('mousedown',e=>{
  if(!getPhoto()) return; isDragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  dragStartState={x:state.photoX,y:state.photoY};
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  const sz=SIZES[state.size];
  state.photoX=Math.max(-50,Math.min(50,dragStartState.x+(e.clientX-dragStart.x)/currentScale/sz.w*100));
  state.photoY=Math.max(-50,Math.min(50,dragStartState.y+(e.clientY-dragStart.y)/currentScale/sz.h*100));
  renderCanvas();
});
document.addEventListener('mouseup',()=>{isDragging=false;});

// Touch drag
cvs.addEventListener('touchstart',e=>{
  if(!getPhoto()||e.touches.length!==1) return;
  isDragging=true;
  dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  dragStartState={x:state.photoX,y:state.photoY};
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(!isDragging||e.touches.length!==1) return;
  const sz=SIZES[state.size];
  state.photoX=Math.max(-50,Math.min(50,dragStartState.x+(e.touches[0].clientX-dragStart.x)/currentScale/sz.w*100));
  state.photoY=Math.max(-50,Math.min(50,dragStartState.y+(e.touches[0].clientY-dragStart.y)/currentScale/sz.h*100));
  state.userHasZoomed=true;
  renderCanvas(); e.preventDefault();
},{passive:false});
document.addEventListener('touchend',()=>{isDragging=false;});

// Pinch-to-zoom on mobile
let lastPinchDist=null;
cvs.addEventListener('touchstart',e=>{
  if(e.touches.length===2) lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
cvs.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastPinchDist){
      state.photoZoom=Math.max(50,Math.min(350,state.photoZoom*(dist/lastPinchDist)));
      state.userHasZoomed=true;
      showZoom(); renderCanvas();
    }
    lastPinchDist=dist; e.preventDefault();
  }
},{passive:false});
cvs.addEventListener('touchend',()=>{lastPinchDist=null;});

// Scroll wheel zoom
cvs.addEventListener('wheel',e=>{
  if(!getPhoto()) return; e.preventDefault();
  state.photoZoom=Math.max(50,Math.min(350,state.photoZoom-e.deltaY*.18));
  state.userHasZoomed=true;
  showZoom(); renderCanvas();
},{passive:false});

// Swipe down to close drawer
let drawerStartY=0;
document.getElementById('drawer').addEventListener('touchstart',e=>{
  drawerStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('drawer').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-drawerStartY>80) closeDrawer();
},{passive:true});

/* ═══ EXPORT ═══════════════════════════════════════════════════ */
async function doExport(btn){
  btn.disabled=true; btn.textContent='Exporting...';
  const c=document.getElementById('post-canvas');
  const sz=SIZES[state.size];
  const orig=c.style.transform;
  c.style.transform='none'; c.style.width=sz.w+'px'; c.style.height=sz.h+'px';
  await new Promise(r=>setTimeout(r,150));
  try{
    const cv=await html2canvas(c,{scale:1,width:sz.w,height:sz.h,backgroundColor:null,useCORS:true,allowTaint:false,logging:false});
    const a=document.createElement('a');
    a.download=`cb_select_${state.postType.replace(/-/g,'_')}_${state.size}_t${state.template}.png`;
    a.href=cv.toDataURL('image/png'); a.click();
  }catch(err){alert('Export failed: '+err.message);}
  finally{c.style.transform=orig;fitCanvas();btn.disabled=false;btn.textContent=btn.classList.contains('mobile-export-btn')?'Export PNG':'Export PNG';}
}
document.getElementById('export-btn-desktop').addEventListener('click',function(){doExport(this);});
document.getElementById('export-btn-mobile').addEventListener('click',function(){doExport(this);});

window.addEventListener('resize',fitCanvas);

buildThumbs();
buildSizePills();
bindFormEvents();
renderCanvas();
</script>
